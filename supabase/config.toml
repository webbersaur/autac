
[functions.notify-submission]
enabled = true
verify_jwt = true
import_map = "./functions/notify-submission/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/notify-submission/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/notify-submission/*.html" ]

[functions.submit-form]
enabled = true
# Public form endpoint — auth happens via Cloudflare Turnstile, not JWT.
verify_jwt = false
import_map = "./functions/submit-form/deno.json"
entrypoint = "./functions/submit-form/index.ts"
